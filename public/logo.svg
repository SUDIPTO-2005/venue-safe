<svg width="520" height="180" viewBox="0 0 520 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .shield {
        stroke-dasharray: 360;
        stroke-dashoffset: 360;
        animation: drawShield 2s ease forwards, redPulse 2s ease-in-out infinite 2s;
      }

      .pulse {
        stroke-dasharray: 140;
        stroke-dashoffset: 140;
        animation: drawPulse 1.6s ease forwards 1s, pulseGlow 1.2s ease-in-out infinite 2.4s;
      }

      .venue {
        opacity: 0;
        animation: fadeIn 0.8s ease forwards 1.8s;
      }

      .safe {
        opacity: 0;
        animation: fadeIn 0.8s ease forwards 2.1s, redPulse 2s ease-in-out infinite 2.8s;
      }

      .line {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: drawLine 1s ease forwards 2.4s;
      }

      .tagline {
        opacity: 0;
        animation: fadeIn 0.8s ease forwards 2.8s, cyanPulse 1.8s ease-in-out infinite 3.3s;
      }

      .scan {
        animation: scanMove 2.8s linear infinite;
      }

      @keyframes drawShield {
        to { stroke-dashoffset: 0; }
      }

      @keyframes drawPulse {
        to { stroke-dashoffset: 0; }
      }

      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes redPulse {
        0%, 100% { filter: drop-shadow(0 0 4px #ff0040); }
        50% { filter: drop-shadow(0 0 14px #ff0040); }
      }

      @keyframes cyanPulse {
        0%, 100% { filter: drop-shadow(0 0 4px #00f0ff); }
        50% { filter: drop-shadow(0 0 14px #00f0ff); }
      }

      @keyframes pulseGlow {
        0%, 100% { stroke-width: 3; }
        50% { stroke-width: 5; }
      }

      @keyframes scanMove {
        0% { transform: translateX(160px); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateX(450px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="520" height="180" fill="#03050A"/>

  <path class="shield"
        d="M90 28 L132 44 L132 84 C132 116 111 137 90 148 C69 137 48 116 48 84 L48 44 Z"
        stroke="#FF0040"
        stroke-width="3"
        fill="rgba(255,0,64,0.04)"
        filter="url(#redGlow)"/>

  <polyline class="pulse"
            points="60,90 74,90 82,75 94,112 105,90 120,90"
            stroke="#FF0040"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            filter="url(#redGlow)"/>

  <circle cx="90" cy="90" r="48" stroke="#FF0040" stroke-width="1" opacity="0.18">
    <animate attributeName="r" values="42;55;42" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <text class="venue"
        x="160" y="84"
        font-family="Orbitron, Arial, sans-serif"
        font-size="38"
        letter-spacing="4"
        fill="#F2F6FF">
    VENUE
  </text>

  <text class="safe"
        x="306" y="84"
        font-family="Orbitron, Arial, sans-serif"
        font-size="38"
        letter-spacing="4"
        fill="#FF0040">
    SAFE
  </text>

  <line class="line" x1="160" y1="105" x2="455" y2="105" stroke="#00F0FF" stroke-width="1.5" opacity="0.7"/>

  <rect class="scan" x="0" y="99" width="34" height="12" fill="#00F0FF" opacity="0.18" filter="url(#cyanGlow)"/>

  <text class="tagline"
        x="160" y="132"
        font-family="Orbitron, Arial, sans-serif"
        font-size="14"
        letter-spacing="3.5"
        fill="#00F0FF">
    COMMAND SYSTEM v2.0
  </text>
</svg>
